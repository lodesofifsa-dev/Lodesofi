  <style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  color:#222;
}

/* HEADER */

header{
  background:#25D366;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

h1{
  color:#ffffff;
  margin:0;
  text-align:center;
  font-size:32px;
}

#search{
  padding:10px;
  width:70%;
  border:none;
  border-radius:6px;
}

/* CATEGORIAS */

nav {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
  padding: 10px;
}

nav button {
  background: #2d8cff;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
}

/* efecto al tocar */
nav button:hover {
  background: #1a6ed8;
}
    
/* PRODUCTOS */

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#0ea5e9;
  border-radius:10px;
  padding:10px;
  text-align:center;
  border:2px solid #000;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}
.card h3{
  font-size:15px;
  color:#fff;
}

.price{
  font-size:24px;
  font-weight:bold;
  color:#ffffff;
  text-shadow:0 2px 4px rgba(0,0,0,0.4);
  margin:8px 0;
}
.card img{
  width:100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius:6px;
}

.add-btn{
  background:#ffffff;
  color:black;
  border:none;
  padding:8px;
  margin-top:8px;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

/* CARRITO */

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:999;
}

.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:360px;
  height:100%;
  background:#fff;
  border-left:3px solid #0ea5e9;
  padding:20px;
  overflow-y:auto;
  transition:0.3s;
  z-index:1000;
}

.cart.open{
  right:0;
}

.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart h2{
  color:#0ea5e9;
  margin:0;
}

.close-cart{
  font-size:22px;
  cursor:pointer;
}

.cart-item{
  margin:15px 0;
  border-bottom:1px solid #ddd;
  padding-bottom:10px;
}

.qty-btn{
  background:#0ea5e9;
  color:white;
  border:none;
  padding:4px 8px;
  margin:0 3px;
  cursor:pointer;
}

.remove-btn{
  background:red;
  border:none;
  padding:4px 6px;
  color:#fff;
  cursor:pointer;
}

.checkout{
  background:#25D366;
  border:none;
  color:white;
  padding:12px;
  width:100%;
  font-weight:bold;
  margin-top:20px;
  font-size:16px;
  cursor:pointer;
  border-radius:6px;
}

.total-box{
  margin-top:15px;
  padding-top:10px;
  border-top:2px solid #0ea5e9;
}

/* BOTON CARRITO */

.floating-cart{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  background:#0ea5e9;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,0.25);
  z-index:2000;
}

.cart-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  font-size:14px;
  font-weight:bold;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* REDES */

.footer{
  background:#25D366;
  padding:40px 20px;
  margin-top:40px;
  text-align:center;
}

.footer-redes{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.social-btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
  color:white;
  transition:0.3s;
}

.social-btn:hover{
  transform:scale(1.1);
}

.whatsapp{ background:#1ebe5d; }
.instagram{ background:#E1306C; }
.facebook{ background:#1877F2; }

.copyright{
  margin-top:25px;
  color:white;
  font-size:14px;
  
}
/* efecto zoom en imagen */
.card img {
  transition: transform 0.3s ease;
}

/* cuando pasás el dedo o mouse */
.card:hover img {
  transform: scale(1.08);
}

/* evita que se salga la imagen */
.card {
  overflow: hidden;
  border-radius: 10px;
}

/* efecto extra en toda la tarjeta */
.card {
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.03);
}
    
/* mejora calidad de imágenes */
.card img {
  width: 100%;
  height: auto;
  object-fit: cover;
  image-rendering: auto;
}

/* bajar un poco el zoom para que no se vea borroso */
.card:hover img {
  transform: scale(1.04);
}    
  </style>

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let categoriaActiva=localStorage.getItem("categoriaActiva")||"Promos Semanales";

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function renderProducts(list){
const container=document.getElementById("product-list");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">$${p.price.toLocaleString('es-AR')}</div>
<button class="add-btn" onclick="addToCart(${p.id})">Agregar</button>
</div>`;
});
}

function filterCategory(cat){
categoriaActiva=cat;
localStorage.setItem("categoriaActiva",cat);

if(cat==="Todos") renderProducts(products);
else renderProducts(products.filter(p=>p.category===cat));
}

document.getElementById("search").addEventListener("input",function(){
const value=this.value.toLowerCase();

if(value===""){
filterCategory(categoriaActiva);
return;
}

renderProducts(products.filter(p=>p.name.toLowerCase().includes(value)));
});

function addToCart(id){
let item=cart.find(p=>p.id===id);
if(item) item.qty++;
else{
let product=products.find(p=>p.id===id);
cart.push({...product,qty:1});
}
updateCart();
saveCart();
}

function updateCart(){
const cartItems=document.getElementById("cart-items");
const cartTotal=document.getElementById("cart-total");
cartItems.innerHTML="";
let total=0;
let totalCantidad=0;

cart.forEach(item=>{
let subtotal=item.price*item.qty;
total+=subtotal;
totalCantidad+=item.qty;

cartItems.innerHTML+=`
<div class="cart-item">
<strong>${item.name}</strong><br>
$${item.price.toLocaleString("es-AR")} c/u<br>

<button class="qty-btn" onclick="changeQty(${item.id},-1)">-</button>
${item.qty}
<button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>

<button class="remove-btn" onclick="removeItem(${item.id})">x</button>

<div style="float:right;">
<strong>$${subtotal.toLocaleString("es-AR")}</strong>
</div>
</div>`;
});

let envio=0;
let descuento= total>60000 ? total*0.10 : 0;
let totalFinal= total + envio - descuento;

cartTotal.innerHTML=`
<div class="total-box">
Subtotal: $${total.toLocaleString("es-AR")}<br>
Envío: $${envio.toLocaleString("es-AR")}<br>
Descuento: -$${descuento.toLocaleString("es-AR")}<br>

<h3 style="color:#d4af37;">
Total: $${totalFinal.toLocaleString("es-AR")}
</h3>

</div>
`;

document.getElementById("cart-count").innerText=totalCantidad;
}

function changeQty(id,change){
let item=cart.find(p=>p.id===id);
item.qty+=change;
if(item.qty<=0) cart=cart.filter(p=>p.id!==id);
updateCart();
saveCart();
}

function removeItem(id){
cart=cart.filter(p=>p.id!==id);
updateCart();
saveCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
document.getElementById("overlay").style.display=
document.getElementById("cart").classList.contains("open")?"block":"none";
}

function sendWhatsApp(){
if(cart.length===0){alert("El carrito está vacío");return;}

let total=0;
let envio=0;
let message="Hola quiero comprar:%0A%0A";

cart.forEach(item=>{
let subtotal=item.price*item.qty;
total+=subtotal;
message+=`${item.name} x${item.qty} = $${subtotal}%0A`;
});

let descuento= total>60000 ? total*0.10 : 0;
let totalFinal= total + envio - descuento;

message+=`%0ASubtotal: $${total}`;
message+=`%0AEnvío: $${envio}`;
message+=`%0ADescuento: -$${descuento}`;
message+=`%0A*TOTAL FINAL: $${totalFinal}*`;

window.open(`https://wa.me/5493704626684?text=${message}`);
}

/* 🔥 CARGA INICIAL INTELIGENTE */
filterCategory(categoriaActiva);
updateCart();
