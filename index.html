<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo de Sofi - Artículos de Limpieza</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
}

header{
  background:#000;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

h1{
  color:#d4af37;
  margin:0;
  text-align:center;
}

#search{
  padding:10px;
  width:100%;
  border:none;
  border-radius:5px;
}

nav{
  background:#1a1a1a;
  padding:10px;
  display:flex;
  gap:10px;
  overflow-x:auto;
}

nav button{
  background:#d4af37;
  border:none;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  text-align:center;
  border:1px solid #d4af37;
  border-radius:8px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:5px;
}

.add-btn{
  background:#d4af37;
  border:none;
  padding:8px;
  margin-top:8px;
  font-weight:bold;
  cursor:pointer;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:999;
}

.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:360px;
  height:100%;
  background:#000;
  border-left:2px solid #d4af37;
  padding:20px;
  overflow-y:auto;
  transition:0.3s;
  z-index:1000;
}

.cart.open{ right:0; }

.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart h2{ color:#d4af37; margin:0; }

.close-cart{ font-size:22px; cursor:pointer; }

.cart-item{
  margin:15px 0;
  border-bottom:1px solid #333;
  padding-bottom:10px;
}

.qty-btn{
  background:#d4af37;
  border:none;
  padding:4px 8px;
  margin:0 3px;
  cursor:pointer;
}

.remove-btn{
  background:red;
  border:none;
  padding:4px 6px;
  color:#fff;
  cursor:pointer;
}

.checkout{
  background:#25D366;
  border:none;
  padding:12px;
  width:100%;
  font-weight:bold;
  margin-top:20px;
  font-size:16px;
  cursor:pointer;
}

.total-box{
  margin-top:15px;
  padding-top:10px;
  border-top:2px solid #d4af37;
}

.floating-cart{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  background:#d4af37;
  color:#000;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(212,175,55,0.7);
  z-index:2000;
}

.cart-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  font-size:14px;
  font-weight:bold;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<header>
<h1>LO DE SOFI</h1>
<input type="text" id="search" placeholder="Buscar...">
</header>

<nav>
<button onclick="filterCategory('Promos')">Promos</button>
<button onclick="filterCategory('Todos')">Todos</button>
<button onclick="filterCategory('Limpieza')">Limpieza</button>
<button onclick="filterCategory('Insecticida')">Insecticida</button>
<button onclick="filterCategory('Plasticos')">Plasticos</button>
<button onclick="filterCategory('Aerosol / Aromatizantes')">Aerosol / Aromatizantes</button>
<button onclick="filterCategory('Baño')">Baño</button>
<button onclick="filterCategory('Bazar')">Bazar</button>
<button onclick="filterCategory('Sahumerios')">Sahumerios</button>
<button onclick="filterCategory('Productos Sueltos')">Productos Sueltos</button>
</nav>

<div class="products" id="product-list"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
  <div class="cart-header">
    <h2>Carrito</h2>
    <span class="close-cart" onclick="toggleCart()">✖</span>
  </div>
  <div id="cart-items"></div>
  <div id="cart-total"></div>
  <button class="checkout" onclick="sendWhatsApp()">Finalizar por WhatsApp</button>
</div>

<div class="floating-cart" onclick="toggleCart()">
  🛒
  <span id="cart-count" class="cart-badge">0</span>
</div>

<script>
let products=[
{id:1,name:"Lavandina Ayudin Original 1LT",price:1500,category:"Limpieza",img:"imagenes/lavandina-ayudin.jpeg"},
{id:2,name:"Lavandina X5 Original 1LT",price:1500,category:"Limpieza",img:"imagenes/comun1.png"},
{id:3,name:"Desodorante para piso Poett 900ml",price:2000,category:"Limpieza",img:"imagenes/poett1.jpg"},
{id:4,name:"Desodorante para piso Poett 900ml",price:2000,category:"Limpieza",img:"imagenes/poett2.jpg"},
{id:5,name:"Desodorante para piso Poett 900ml",price:2000,category:"Limpieza",img:"imagenes/poett.webp"},
{id:6,name:"Lavandina en Gel Ayudin 700ml",price:3500,category:"Limpieza",img:"imagenes/engel.jpg"},
{id:7,name:"Cif Cremoso 750g",price:4600,category:"Limpieza",img:"imagenes/cif750.jpg"},
{id:8,name:"Cif Cremoso 375g",price:2700,category:"Limpieza",img:"imagenes/cif375.jpg"},
{id:9,name:"MR. Musculo Cremoso 450cm",price:4000,category:"Limpieza",img:"imagenes/mr.jpeg"},
{id:10,name:"Detergente Cif 300ml",price:2500,category:"Limpieza",img:"imagenes/cif250.jpg"},
{id:11,name:"Detergente Cif 300ml",price:2500,category:"Limpieza",img:"imagenes/cif300.jpeg"},
{id:12,name:"Detergente Cif 500ml",price:4500,category:"Limpieza",img:"imagenes/cif500.jpg"},
{id:19,name:"Detergente Cif Recarga Económica 400ml",price:3500,category:"Limpieza",img:"imagenes/doypack.webp"},
{id:13,name:"Detergente Magistral 250ml",price:3000,category:"Limpieza",img:"imagenes/magis1.jpg"},
{id:14,name:"Detergente Magistral 500ml",price:5000,category:"Limpieza",img:"imagenes/magis2.jpg"},
{id:15,name:"Detergente Tipo Magistral",price:3500,category:"Productos Sueltos",img:"imagenes/tipomagi.jpg"},
{id:16,name:"Tipo Cif Cremoso 250g",price:2000,category:"Productos Sueltos",img:"imagenes/tipocif.jpg"},
{id:17,name:"Desengrasante Brillonet Cocina y Baño 1 Litro",price:3000,category:"Productos Sueltos",img:"imagenes/brillonet.jpg"},
{id:18,name:"Desengrasante Industrial grasas difíciles 1 Litro",price:3000,category:"Productos Sueltos",img:"imagenes/industrial.jpg"},
{id:20,name:"Lavandina en Gel 1 Litro",price:3500,category:"Productos Sueltos",img:"imagenes/tipogel1.jpg"},
{id:21,name:"Lavandina en Gel 500ml",price:2700,category:"Productos Sueltos",img:"imagenes/tipogel2.jpg"},
{id:22,name:"Lavandina Ropa Blanca 1 Litro",price:2500,category:"Productos Sueltos",img:"imagenes/ropablanca.jpg"},
{id:23,name:"Lavandina Ropa Color 1 Litro",price:2500,category:"Productos Sueltos",img:"imagenes/ropacolor.jpg"},
{id:24,name:"Quitamanchas 1 Litro",price:2500,category:"Productos Sueltos",img:"imagenes/quitaman.jpg"},
{id:25,name:"Desmanchador Plus 1 Litro",price:3000,category:"Productos Sueltos",img:"imagenes/desman.jpg"},
{id:26,name:"Vinagre de Limpieza 1 Litro",price:3000,category:"Productos Sueltos",img:"imagenes/vinagre.jpg"},
{id:27,name:"Neutralizador de Olores 1 Litro",price:2500,category:"Productos Sueltos",img:"imagenes/mataolor.jpg"},
{id:30,name:"Balde Cuadrado 10 Litros",price:6000,category:"Plasticos",img:"imagenes/balde1.webp"},
{id:40,name:"Balde Color 10Litros",price:4000,category:"Plasticos",img:"imagenes/balde2.webp"},
{id:0,name:"Sahumerios Hexagonales",price:1000,category:"Sahumerios",img:"https://via.placeholder.com/200"},
{id:28,name:"Raid Mata en 10 Segundos moscas y mosquitos",price:7000,category:"Insecticida",img:"imagenes/raid10.webp"},
{id:29,name:"Raid Mata Casa y Jardin",price:7000,category:"Insecticida",img:"imagenes/raidcyj.webp"},
{id:31,name:"Raid Larvas y Polillas",price:9500,category:"Insecticida",img:"imagenes/raidlyp.jpg"},
{id:32,name:"Raid Exterminada Cucarachas mata por 6 semanas",price:7000,category:"Insecticida",img:"imagenes/raidcuca.webp"},
{id:33,name:"Efecto naranja Casa y Jardin",price:4500,category:"Insecticida",img:"imagenes/efectonj.jpg"},
{id:34,name:"Efecto Azul Moscas y Mosquitos",price:4500,category:"Insecticida",img:"imagenes/efectoazul.jpg"},
{id:35,name:"Efecto Rojo Plus Moscas y Mosquitos sin olor",price:4500,category:"Insecticida",img:"imagenes/efectorojo.png"},
{id:36,name:"Fuyi moscas y Mosquitos",price:5500,category:"Insecticida",img:"imagenes/fuyi.jpg"},
{id:37,name:"Baygon Cucarachas y Arañas",price:5500,category:"Insecticida",img:"imagenes/baygon.jpeg"},
{id:38,name:"Selton Rojo Moscas y Mosquitos",price:5500,category:"Insecticida",img:"imagenes/seltonrojo.jpg"},
{id:39,name:"Selton Azul Moscas y Mosquitos Sin Olor a Solvente",price:7000,category:"Insecticida",img:"imagenes/seltonazul.png"},

];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let categoriaActiva=localStorage.getItem("categoriaActiva")||"Promos";

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function renderProducts(list){
const container=document.getElementById("product-list");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button class="add-btn" onclick="addToCart(${p.id})">Agregar</button>
</div>`;
});
}

function filterCategory(cat){
categoriaActiva=cat;
localStorage.setItem("categoriaActiva",cat);

if(cat==="Todos") renderProducts(products);
else renderProducts(products.filter(p=>p.category===cat));
}

document.getElementById("search").addEventListener("input",function(){
const value=this.value.toLowerCase();

if(value===""){
filterCategory(categoriaActiva);
return;
}

renderProducts(products.filter(p=>p.name.toLowerCase().includes(value)));
});

function addToCart(id){
let item=cart.find(p=>p.id===id);
if(item) item.qty++;
else{
let product=products.find(p=>p.id===id);
cart.push({...product,qty:1});
}
updateCart();
saveCart();
}

function updateCart(){
const cartItems=document.getElementById("cart-items");
const cartTotal=document.getElementById("cart-total");
cartItems.innerHTML="";
let total=0;
let totalCantidad=0;

cart.forEach(item=>{
let subtotal=item.price*item.qty;
total+=subtotal;
totalCantidad+=item.qty;

cartItems.innerHTML+=`
<div class="cart-item">
<strong>${item.name}</strong><br>
$${item.price} c/u<br>
<button class="qty-btn" onclick="changeQty(${item.id},-1)">-</button>
${item.qty}
<button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
<button class="remove-btn" onclick="removeItem(${item.id})">x</button>
<div style="float:right;"><strong>$${subtotal}</strong></div>
</div>`;
});

let envio=3000;
let descuento= total>40000 ? total*0.10 : 0;
let totalFinal= total + envio - descuento;

cartTotal.innerHTML=`
<div class="total-box">
Subtotal: $${total}<br>
Envío: $${envio}<br>
Descuento: -$${descuento}<br>
<h3 style="color:#d4af37;">Total: $${totalFinal}</h3>
</div>
`;

document.getElementById("cart-count").innerText=totalCantidad;
}

function changeQty(id,change){
let item=cart.find(p=>p.id===id);
item.qty+=change;
if(item.qty<=0) cart=cart.filter(p=>p.id!==id);
updateCart();
saveCart();
}

function removeItem(id){
cart=cart.filter(p=>p.id!==id);
updateCart();
saveCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
document.getElementById("overlay").style.display=
document.getElementById("cart").classList.contains("open")?"block":"none";
}

function sendWhatsApp(){
if(cart.length===0){alert("El carrito está vacío");return;}

let total=0;
let envio=3000;
let message="Hola quiero comprar:%0A%0A";

cart.forEach(item=>{
let subtotal=item.price*item.qty;
total+=subtotal;
message+=`${item.name} x${item.qty} = $${subtotal}%0A`;
});

let descuento= total>40000 ? total*0.10 : 0;
let totalFinal= total + envio - descuento;

message+=`%0ASubtotal: $${total}`;
message+=`%0AEnvío: $${envio}`;
message+=`%0ADescuento: -$${descuento}`;
message+=`%0A*TOTAL FINAL: $${totalFinal}*`;

window.open(`https://wa.me/5493704626684?text=${message}`);
}

/* 🔥 CARGA INICIAL INTELIGENTE */
filterCategory(categoriaActiva);
updateCart();
</script>

</body>
</html>
