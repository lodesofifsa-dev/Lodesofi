<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo de Sofi Artículos de Limpieza</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
}

header{
  background:#000;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

h1{
  color:#d4af37;
  margin:0;
  text-align:center;
}

#search{
  padding:10px;
  width:100%;
  border:none;
  border-radius:5px;
}

nav{
  background:#1a1a1a;
  padding:10px;
  display:flex;
  gap:10px;
  overflow-x:auto;
}

nav button{
  background:#d4af37;
  border:none;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
}

nav button.active{
  background:#fff;
  color:#000;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  text-align:center;
  border:1px solid #d4af37;
  border-radius:8px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:5px;
}

.add-btn{
  background:#d4af37;
  border:none;
  padding:8px;
  margin-top:8px;
  font-weight:bold;
  cursor:pointer;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:999;
}

.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:360px;
  height:100%;
  background:#000;
  border-left:2px solid #d4af37;
  padding:20px;
  overflow-y:auto;
  transition:0.3s;
  z-index:1000;
}

.cart.open{ right:0; }

.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart h2{ color:#d4af37; margin:0; }

.close-cart{ font-size:22px; cursor:pointer; }

.cart-item{
  margin:15px 0;
  border-bottom:1px solid #333;
  padding-bottom:10px;
}

.qty-btn{
  background:#d4af37;
  border:none;
  padding:4px 8px;
  margin:0 3px;
  cursor:pointer;
}

.remove-btn{
  background:red;
  border:none;
  padding:4px 6px;
  color:#fff;
  cursor:pointer;
}

.checkout{
  background:#25D366;
  border:none;
  padding:12px;
  width:100%;
  font-weight:bold;
  margin-top:20px;
  font-size:16px;
  cursor:pointer;
}

.total-box{
  margin-top:15px;
  padding-top:10px;
  border-top:2px solid #d4af37;
}

.floating-cart{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  background:#d4af37;
  color:#000;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(212,175,55,0.7);
  z-index:2000;
}

.cart-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  font-size:14px;
  font-weight:bold;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<header>
<h1>LO DE SOFI</h1>
<input type="text" id="search" placeholder="Buscar...">
</header>

<nav id="category-nav">
<button data-cat="Novedades">Novedades</button>
<button data-cat="Limpieza">Limpieza</button>
<button data-cat="Hogar">Hogar</button>
<button data-cat="Plásticos">Plásticos</button>
<button data-cat="Baño">Baño</button>
<button data-cat="Bazar">Bazar</button>
<button data-cat="Sahumerios">Sahumerios</button>
</nav>

<div class="products" id="product-list"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
  <div class="cart-header">
    <h2>Carrito</h2>
    <span class="close-cart" onclick="toggleCart()">✖</span>
  </div>
  <div id="cart-items"></div>
  <div id="cart-total"></div>
  <button class="checkout" onclick="sendWhatsApp()">Finalizar por WhatsApp</button>
</div>

<div class="floating-cart" onclick="toggleCart()">
  🛒
  <span id="cart-count" class="cart-badge">0</span>
</div>

<script>
let products=[
{id:1,name:"Lavandina Ayudin Original 1LT",price:1500,category:"Limpieza",img:"imagenes/lavandina-ayudin.jpeg", isNew:true},
{id:2,name:"Lavandina X5 Original 1LT",price:1500,category:"Limpieza",img:"imagenes/comun1.png", isNew:false},
{id:3,name:"Desodorante de piso Poett 900ml",price:2000,category:"Limpieza",img:"https://via.placeholder.com/200", isNew:true},
{id:4,name:"Desodorante baño",price:1200,category:"Baño",img:"https://via.placeholder.com/200", isNew:false},
{id:5,name:"Taza",price:2000,category:"Bazar",img:"https://via.placeholder.com/200", isNew:true},
{id:6,name:"Sahumerios Hexagonales",price:1000,category:"Sahumerios",img:"https://via.placeholder.com/200", isNew:false}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let categoriaActiva=localStorage.getItem("categoriaActiva")||"Novedades";
let searchActiva=localStorage.getItem("searchActiva")||"";
let cartOpen=localStorage.getItem("cartOpen")==="true"?true:false;

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function saveState(){
localStorage.setItem("categoriaActiva",categoriaActiva);
localStorage.setItem("searchActiva",searchActiva);
localStorage.setItem("cartOpen",cartOpen);
}

function renderProducts(list){
const container=document.getElementById("product-list");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button class="add-btn" onclick="addToCart(${p.id})">Agregar</button>
</div>`;
});
}

function filterCategory(cat){
categoriaActiva=cat;
searchActiva=""; // limpia búsqueda cuando cambias categoría
updateNavActive();
renderCategory();
saveState();
}

function renderCategory(){
if(categoriaActiva==="Novedades"){
renderProducts(products.filter(p=>p.isNew));
} else {
renderProducts(products.filter(p=>p.category===categoriaActiva));
}
}

function updateNavActive(){
document.querySelectorAll("#category-nav button").forEach(b=>{
b.classList.toggle("active",b.dataset.cat===categoriaActiva);
}
);
}

document.getElementById("search").addEventListener("input",function(){
searchActiva=this.value.toLowerCase();
if(searchActiva===""){
renderCategory();
} else {
renderProducts(products.filter(p=>p.name.toLowerCase().includes(searchActiva)));
}
saveState();
});

// carrito
function addToCart(id){
let item=cart.find(p=>p.id===id);
if(item) item.qty++;
else{
let product=products.find(p=>p.id===id);
cart.push({...product,qty:1});
}
updateCart();
saveCart();
}

function updateCart(){
const cartItems=document.getElementById("cart-items");
const cartTotal=document.getElementById("cart-total");
cartItems.innerHTML="";
let total=0;
let totalCantidad=0;

cart.forEach(item=>{
let subtotal=item.price*item.qty;
total+=subtotal;
totalCantidad+=item.qty;

cartItems.innerHTML+=`
<div class="cart-item">
<strong>${item.name}</strong><br>
$${item.price} c/u<br>
<button class="qty-btn" onclick="changeQty(${item.id},-1)">-</button>
${item.qty}
<button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
<button class="remove-btn" onclick="removeItem(${item.id})">x</button>
<div style="float:right;"><strong>$${subtotal}</strong></div>
</div>`;
});

let envio=3000;
let descuento= total>20000 ? total*0.10 : 0;
let totalFinal= total + envio - descuento;

cartTotal.innerHTML=`
<div class="total-box">
Subtotal: $${total}<br>
Envío: $${envio}<br>
Descuento: -$${descuento}<br>
<h3 style="color:#d4af37;">Total: $${totalFinal}</h3>
</div>
`;

document.getElementById("cart-count").innerText=totalCantidad;
}

// qty y remove
function changeQty(id,change){
let item=cart.find(p=>p.id===id);
item.qty+=change;
if(item.qty<=0) cart=cart.filter(p=>p.id!==id);
updateCart();
saveCart();
}

function removeItem(id){
cart=cart.filter(p=>p.id!==id);
updateCart();
saveCart();
}

// toggle cart
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
cartOpen=document.getElementById("cart").classList.contains("open");
document.getElementById("overlay").style.display=
cartOpen?"block":"none";
saveState();
}

// WhatsApp
function sendWhatsApp(){
if(cart.length===0){alert("El carrito está vacío");return;}

let total=0;
let envio=3000;
let message="Hola quiero comprar:%0A%0A";

cart.forEach(item=>{
let subtotal=item.price*item.qty;
total+=subtotal;
message+=`${item.name} x${item.qty} = $${subtotal}%0A`;
});

let descuento= total>20000 ? total*0.10 : 0;
let totalFinal= total + envio - descuento;

message+=`%0ASubtotal: $${total}`;
message+=`%0AEnvío: $${envio}`;
message+=`%0ADescuento: -$${descuento}`;
message+=`%0A*TOTAL FINAL: $${totalFinal}*`;

window.open(`https://wa.me/5493704626684?text=${message}`);
}

// 🔥 INIT
document.getElementById("search").value=searchActiva;
updateNavActive();
if(cartOpen) toggleCart();
renderCategory();
updateCart();
</script>

</body>
</html>
