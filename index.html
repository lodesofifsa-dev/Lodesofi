<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo de Sofi</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f8;
}

header{
    background:#2e7d32;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

nav{
    margin-top:10px;
}

nav button{
    background:white;
    color:#2e7d32;
    border:none;
    padding:8px 12px;
    margin:4px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

nav button:hover{
    background:#e8f5e9;
}

.buscador{
    text-align:center;
    padding:20px;
    background:white;
}

#buscador{
    width:60%;
    max-width:500px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.section{
    padding:40px 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.btn{
    background:#2e7d32;
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover{
    background:#1b5e20;
}

.carrito{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2e7d32;
    color:white;
    padding:15px 20px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}

footer{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
    <h2>Lo de Sofi</h2>
    <nav>
        <button onclick="filtrar('all')">Ver Todo</button>
        <button onclick="filtrar('limpieza')">Limpieza</button>
        <button onclick="filtrar('hogar')">Hogar</button>
        <button onclick="filtrar('plasticos')">Plásticos</button>
        <button onclick="filtrar('bano')">Baño</button>
        <button onclick="filtrar('bazar')">Bazar</button>
        <button onclick="filtrar('sahumerios')">Sahumerios</button>
    </nav>
</header>

<div class="buscador">
    <input type="text" id="buscador" placeholder="Buscar productos..." onkeyup="buscarProducto()">
</div>

<section class="section">
<div class="grid">

<div class="card limpieza">
    <img src="imagenes/limpieza1.jpg">
    <h3>Lavandina</h3>
    <p>$3000</p>
    <button class="btn" onclick="agregar('Lavandina',3000)">Agregar</button>
</div>

<div class="card hogar">
    <img src="imagenes/hogar1.jpg">
    <h3>Repasador</h3>
    <p>$2500</p>
    <button class="btn" onclick="agregar('Repasador',2500)">Agregar</button>
</div>

<div class="card plasticos">
    <img src="imagenes/plastico1.jpg">
    <h3>Tupper Grande</h3>
    <p>$5000</p>
    <button class="btn" onclick="agregar('Tupper Grande',5000)">Agregar</button>
</div>

<div class="card bano">
    <img src="imagenes/bano1.jpg">
    <h3>Cortina de baño</h3>
    <p>$8000</p>
    <button class="btn" onclick="agregar('Cortina de baño',8000)">Agregar</button>
</div>

<div class="card bazar">
    <img src="imagenes/bazar1.jpg">
    <h3>Juego de vasos</h3>
    <p>$12000</p>
    <button class="btn" onclick="agregar('Juego de vasos',12000)">Agregar</button>
</div>

<div class="card sahumerios">
    <img src="imagenes/sahumerio1.jpg">
    <h3>Sahumerio Lavanda</h3>
    <p>$1500</p>
    <button class="btn" onclick="agregar('Sahumerio Lavanda',1500)">Agregar</button>
</div>

</div>
</section>

<div class="carrito" onclick="mostrarCarrito()">
🛒 Carrito (<span id="contadorCarrito">0</span>)
</div>

<footer>
© 2026 Lo de Sofi
</footer>

<script>

let carrito = [];

// AGREGAR PRODUCTO
function agregar(nombre, precio){
    let productoExistente = carrito.find(item => item.nombre === nombre);

    if(productoExistente){
        productoExistente.cantidad += 1;
    } else {
        carrito.push({nombre, precio, cantidad: 1});
    }

    actualizarContador();
}

// ACTUALIZA CONTADOR TOTAL DE ITEMS
function actualizarContador(){
    let totalCantidad = carrito.reduce((acc, item) => acc + item.cantidad, 0);
    document.getElementById("contadorCarrito").innerText = totalCantidad;
}

// MOSTRAR CARRITO DETALLADO
function mostrarCarrito(){
    if(carrito.length === 0){
        alert("El carrito está vacío");
        return;
    }

    let mensaje = "🛒 Tu carrito:\n\n";
    let total = 0;

    carrito.forEach((item,i)=>{
        let subtotal = item.precio * item.cantidad;
        mensaje += 
        (i+1)+". "+item.nombre+
        "\n   Cantidad: "+item.cantidad+
        "\n   Subtotal: $"+subtotal+"\n\n";

        total += subtotal;
    });

    mensaje += "TOTAL: $"+total+"\n\n";
    mensaje += "¿Enviar pedido por WhatsApp?";

    if(confirm(mensaje)){
        let mensajeWA = "Hola, quiero comprar:%0A";
        
        carrito.forEach(item=>{
            mensajeWA += 
            "- "+item.nombre+
            " x"+item.cantidad+
            " ($"+(item.precio*item.cantidad)+")%0A";
        });

        mensajeWA += "%0ATotal: $"+total;

        window.open("https://wa.me/5493704626684?text="+mensajeWA);
    }
}

// FILTRO POR CATEGORIA
function filtrar(categoria){
    let cards = document.querySelectorAll(".card");
    cards.forEach(card=>{
        if(categoria === "all"){
            card.style.display = "block";
        }else{
            card.style.display = card.classList.contains(categoria) ? "block" : "none";
        }
    });
}

// BUSCADOR
function buscarProducto(){
    let input = document.getElementById("buscador").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let texto = card.innerText.toLowerCase();
        card.style.display = texto.includes(input) ? "block" : "none";
    });
}

</script>

</body>
</html>
